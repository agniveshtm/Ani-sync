<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#02a9ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#7c3aed" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern (knowledge graph feel) -->
  <g opacity="0.08" stroke="#fff" stroke-width="1.5">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- Graph nodes (6 nodes = 6 note types) -->
  <!-- Anime node (blue) -->
  <circle cx="256" cy="120" r="28" fill="#02a9ff" filter="url(#innerGlow)" opacity="0.95"/>
  <circle cx="256" cy="120" r="8" fill="white"/>

  <!-- Manga node (purple) -->
  <circle cx="140" cy="230" r="24" fill="#8b5cf6" filter="url(#innerGlow)" opacity="0.95"/>
  <circle cx="140" cy="230" r="7" fill="white"/>

  <!-- Staff node (green) -->
  <circle cx="372" cy="230" r="24" fill="#10b981" filter="url(#innerGlow)" opacity="0.95"/>
  <circle cx="372" cy="230" r="7" fill="white"/>

  <!-- Studios node (amber) -->
  <circle cx="175" cy="370" r="22" fill="#f59e0b" filter="url(#innerGlow)" opacity="0.95"/>
  <circle cx="175" cy="370" r="6" fill="white"/>

  <!-- Tags node (rose) -->
  <circle cx="337" cy="370" r="22" fill="#f43f5e" filter="url(#innerGlow)" opacity="0.95"/>
  <circle cx="337" cy="370" r="6" fill="white"/>

  <!-- Characters node (yellow) -->
  <circle cx="256" cy="256" r="32" fill="#eab308" filter="url(#innerGlow)" opacity="0.95"/>
  <circle cx="256" cy="256" r="9" fill="white"/>

  <!-- Graph edges (links between nodes) -->
  <g stroke="url(#linkGrad)" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round">
    <line x1="256" y1="148" x2="256" y2="224"/>
    <line x1="164" y1="230" x2="224" y2="256"/>
    <line x1="348" y1="230" x2="288" y2="256"/>
    <line x1="195" y1="370" x2="232" y2="280"/>
    <line x1="317" y1="370" x2="280" y2="280"/>
    <line x1="160" y1="250" x2="185" y2="350"/>
    <line x1="352" y1="250" x2="327" y2="350"/>
  </g>

  <!-- Central sync symbol (two circular arrows around the characters node) -->
  <g transform="translate(256,256)">
    <!-- Outer sync ring -->
    <circle r="52" fill="none" stroke="url(#glow)" stroke-width="3" stroke-dasharray="8 6" opacity="0.4"/>
    <!-- Sync arrow 1 (top-right) -->
    <path d="M36,-38 A50,50 0 0,1 46,-10" stroke="url(#glow)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <polygon points="48,-6 42,4 52,0" fill="#02a9ff"/>
    <!-- Sync arrow 2 (bottom-left) -->
    <path d="M-36,38 A50,50 0 0,1 -46,10" stroke="url(#glow)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <polygon points="-48,6 -42,-4 -52,0" fill="#a78bfa"/>
  </g>

  <!-- AniList branding - small "A" mark at bottom -->
  <g transform="translate(256, 440)" opacity="0.7">
    <text x="0" y="0" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" letter-spacing="1">Ani-sync</text>
  </g>
</svg>
